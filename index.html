<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Shift Timeline</title>
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#2563eb" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="Shift" />
  <link rel="apple-touch-icon" href="icon.svg" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="app">


    <!-- ── Timeline ── -->
    <div id="timeline-wrapper">
      <div id="time-ruler"></div>
      <div id="timeline-track">
        <div id="segments-container"></div>
        <div id="playhead"></div>
        <div id="future-overlay"></div>
      </div>

      <!-- ── Segment editor (overlays timeline in-place) ── -->
      <div id="editor-panel" class="hidden">
        <div id="editor-header">
          <span id="editor-seg-time"></span>
          <div id="editor-actions">
            <button id="merge-prev-btn" disabled>⟵ Merge prev</button>
            <button id="merge-next-btn" disabled>Merge next ⟶</button>
            <button id="editor-close">✕</button>
          </div>
        </div>
        <div id="editor-body">
          <div id="category-chips"></div>
          <div id="split-buttons">
            <button id="split-halves-btn">½</button>
            <button id="split-n-btn">÷N</button>
          </div>
        </div>
        <div id="notes-section">
          <input type="text" id="notes-input" placeholder="Note…" />
        </div>
      </div>
    </div>

    <!-- ── Shift panel (inline, swaps for timeline) ── -->
    <div id="shift-panel" class="hidden">
      <div class="panel-header">
        <span>Adjust Shift Times</span>
        <button id="shift-panel-cancel">Cancel</button>
        <button id="shift-apply-btn" class="primary">Apply</button>
      </div>
      <div class="panel-body">
        <div class="form-row">
          <label>Start</label>
          <div class="time-picker" data-target="shift-start-input">
            <div class="tp-col" data-unit="hours">
              <button class="tp-btn" data-unit="hours" data-delta="1" aria-label="Hours up">▲</button>
              <div class="tp-val tp-hours">00</div>
              <button class="tp-btn" data-unit="hours" data-delta="-1" aria-label="Hours down">▼</button>
            </div>
            <div class="tp-sep">:</div>
            <div class="tp-col" data-unit="minutes">
              <button class="tp-btn" data-unit="minutes" data-delta="5" aria-label="Minutes up">▲</button>
              <div class="tp-val tp-minutes">00</div>
              <button class="tp-btn" data-unit="minutes" data-delta="-5" aria-label="Minutes down">▼</button>
            </div>
          </div>
          <input type="hidden" id="shift-start-input" />
        </div>
        <div class="form-row" style="margin-bottom:0">
          <label>End</label>
          <div class="time-picker" data-target="shift-end-input">
            <div class="tp-col" data-unit="hours">
              <button class="tp-btn" data-unit="hours" data-delta="1" aria-label="Hours up">▲</button>
              <div class="tp-val tp-hours">00</div>
              <button class="tp-btn" data-unit="hours" data-delta="-1" aria-label="Hours down">▼</button>
            </div>
            <div class="tp-sep">:</div>
            <div class="tp-col" data-unit="minutes">
              <button class="tp-btn" data-unit="minutes" data-delta="5" aria-label="Minutes up">▲</button>
              <div class="tp-val tp-minutes">00</div>
              <button class="tp-btn" data-unit="minutes" data-delta="-5" aria-label="Minutes down">▼</button>
            </div>
          </div>
          <input type="hidden" id="shift-end-input" />
        </div>
        <div id="shift-warning"></div>
      </div>
    </div>

    <!-- ── Shifts list panel (inline, swaps for timeline) ── -->
    <div id="shifts-panel" class="hidden">
      <div class="panel-header">
        <span>Saved shifts</span>
        <button id="shifts-done-btn">Done</button>
      </div>
      <div class="panel-body" id="shifts-list"></div>
    </div>

    <!-- ── Labels panel (inline, swaps for timeline) ── -->
    <div id="labels-panel" class="hidden">
      <div class="panel-header">
        <span>Labels</span>
        <button id="add-label-btn">+ Add</button>
        <button id="labels-done-btn">Done</button>
      </div>
      <div class="panel-body" id="labels-list"></div>
    </div>

    <!-- ── Stats ── -->
    <div id="stats-panel">
      <div class="stat-item">
        <span class="stat-label">Work time</span>
        <span class="stat-value" id="stat-work">—</span>
      </div>
      <div class="stat-item">
        <span class="stat-label">Non-work</span>
        <span class="stat-value" id="stat-nonwork">—</span>
      </div>
      <div class="stat-item">
        <span class="stat-label">Unallocated</span>
        <span class="stat-value" id="stat-unallocated">—</span>
      </div>
      <div class="stat-item">
        <span class="stat-label">Segments</span>
        <span class="stat-value" id="stat-segments">1</span>
      </div>
      <div class="stat-item">
        <span class="stat-label">Interruptions</span>
        <span class="stat-value" id="stat-interruptions">0</span>
      </div>
      <div class="stat-item">
        <span class="stat-label">Longest focus</span>
        <span class="stat-value" id="stat-longest">—</span>
      </div>
      <div class="stat-item">
        <span class="stat-label">Avg segment</span>
        <span class="stat-value" id="stat-avg">—</span>
      </div>
      <div id="controls">
        <button id="shift-btn" title="Adjust shift times">Shift ⚙</button>
        <button id="time-format-btn" title="Toggle 12 / 24-hour format">12h</button>
        <button id="theme-btn" title="Toggle dark mode">◑</button>
        <button id="labels-btn" title="Manage labels">Labels ⚙</button>
        <div class="btn-group">
          <button id="export-btn" title="Export data">Export ↓</button>
          <div id="export-menu" class="dropdown hidden">
            <button data-action="export-json">Briefcase (.json)</button>
            <button data-action="export-csv-detail">Detailed CSV</button>
            <button data-action="export-csv-summary">Summary CSV</button>
          </div>
        </div>
        <label id="import-label" title="Import a briefcase .json file">
          Import ↑
          <input id="import-file" type="file" accept=".json" />
        </label>
        <button id="dock-btn" title="Dock to bottom of screen (PWA only)">⬇ Dock</button>
        <div class="btn-group">
          <button id="cloud-btn" title="Sign in / sync">☁</button>
          <div id="cloud-menu" class="dropdown hidden">
            <button data-action="cloud-save">↑ Save this shift</button>
            <button data-action="cloud-load">↓ Load a shift…</button>
            <div class="cm-sep"></div>
            <button data-action="cloud-signout">Sign out</button>
          </div>
        </div>
        <button id="reset-btn" title="Start a new shift">↺ Reset</button>
      </div>
    </div>

    <!-- ── Context menu ── -->
    <div id="context-menu" class="hidden">
      <div id="cm-cut" class="cm-item cm-primary">✂&nbsp; Cut now</div>
      <div class="cm-sep"></div>
      <div class="cm-row">
        <div id="cm-merge-prev" class="cm-item">⟵ Merge</div>
        <div id="cm-merge-next" class="cm-item">Merge ⟶</div>
      </div>
    </div>

    <!-- ── Toast ── -->
    <div id="toast-container"></div>

    <!-- ── Drag-and-drop overlay ── -->
    <div id="drop-overlay" class="hidden">
      <div id="drop-box">
        <div class="drop-icon">📁</div>
        <div>Drop briefcase file to import</div>
      </div>
    </div>

  </div><!-- #app -->

  <!-- ── Number prompt modal ── -->
  <div id="prompt-overlay" class="modal-overlay hidden">
    <div class="modal-box" style="max-width:300px">
      <div class="modal-header">
        <label id="prompt-label" style="font-size:14px;font-weight:600;"></label>
      </div>
      <div class="modal-body">
        <input id="prompt-input" type="number" min="2" max="20"
               style="width:100%;padding:8px 10px;border:1px solid var(--border);
                      border-radius:var(--radius);background:var(--bg);
                      color:var(--text);font-size:14px;" />
      </div>
      <div class="modal-footer">
        <button id="prompt-cancel">Cancel</button>
        <button id="prompt-ok" class="primary">OK</button>
      </div>
    </div>
  </div>

  <script src="auth.js"></script>
  <script src="script.js"></script>
</body>
</html>
